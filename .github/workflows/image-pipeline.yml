# CANFAR Container Image Pipeline
#
# CI/CD workflow that lints, builds, and pushes the entire CANFAR container
# stack to the CANFAR Harbor registry (images.canfar.net).
#
# Trigger conditions:
#   - Schedule: 1st of every month at 06:00 UTC (picks up upstream base image updates)
#   - Push to main: only when Dockerfiles, this workflow, or bake config change
#   - Pull requests: lint-only (no build/push) when Dockerfiles change
#   - Manual: via GitHub Actions "Run workflow" button (workflow_dispatch)
#
# Selective builds:
#   On push, only images whose Dockerfiles changed are rebuilt. The dependency
#   chain is respected: if terminal changes, all downstream images rebuild.
#   On schedule/dispatch, all images are rebuilt to pick up upstream updates.
#
# Job dependency chain:
#   lint -> python (matrix: 3.10-3.14) -> interactive-stack (terminal, webterm, vscode, marimo)

name: CANFAR Container Image Pipeline

on:
  # Monthly rebuild to pick up upstream security patches and base image updates
  schedule:
    - cron: '0 6 1 * *'
  # On push to main, only rebuild when relevant files change
  push:
    paths:
      - 'dockerfiles/**'
      - '.github/workflows/image-pipeline.yml'
      - 'docker-bake.hcl'
    branches: [main]
  # On PRs, only lint (push guard below prevents building/pushing)
  pull_request:
    paths:
      - 'dockerfiles/**'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Global variables shared across all jobs
env:
  REGISTRY: images.canfar.net

jobs:
  # --- Job: Generate Tag ---
  # Dynamically generates the monthly release tag (YY.MM format).
  # This tag is shared with all downstream jobs.
  setup:
    name: Generate Release Tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.date.outputs.tag }}
    steps:
      - name: Get current date
        id: date
        run: echo "tag=$(date +'%y.%m')" >> $GITHUB_OUTPUT

  # --- Job: Detect Changes ---
  # Determines which Dockerfiles changed to enable selective builds.
  # Respects the dependency chain: terminal changes trigger downstream rebuilds.
  # On schedule/dispatch, all targets are marked for rebuild.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      terminal: ${{ steps.filter.outputs.terminal }}
      webterm: ${{ steps.filter.outputs.webterm }}
      vscode: ${{ steps.filter.outputs.vscode }}
      marimo: ${{ steps.filter.outputs.marimo }}
      bake_targets: ${{ steps.targets.outputs.bake_targets }}
    steps:
      - uses: actions/checkout@v4
      # On schedule/dispatch, rebuild everything
      - name: Force all targets on schedule/dispatch
        id: force-all
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "python=true" >> $GITHUB_OUTPUT
          echo "terminal=true" >> $GITHUB_OUTPUT
          echo "webterm=true" >> $GITHUB_OUTPUT
          echo "vscode=true" >> $GITHUB_OUTPUT
          echo "marimo=true" >> $GITHUB_OUTPUT
      # On push/PR, detect which files changed
      - name: Detect changed paths
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
              - 'dockerfiles/python/**'
            terminal:
              - 'dockerfiles/terminal/**'
            webterm:
              - 'dockerfiles/webterm/**'
            vscode:
              - 'dockerfiles/openvscode/**'
            marimo:
              - 'dockerfiles/marimo/**'
            bake-config:
              - 'docker-bake.hcl'
      # Combine results: respect dependency chain (terminal -> downstream)
      - name: Resolve dependencies
        id: filter
        run: |
          # Use force-all outputs if schedule/dispatch, otherwise use changes
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "python=true" >> $GITHUB_OUTPUT
            echo "terminal=true" >> $GITHUB_OUTPUT
            echo "webterm=true" >> $GITHUB_OUTPUT
            echo "vscode=true" >> $GITHUB_OUTPUT
            echo "marimo=true" >> $GITHUB_OUTPUT
          else
            # Python changes only affect python images
            echo "python=${{ steps.changes.outputs.python }}" >> $GITHUB_OUTPUT
            # Terminal changes cascade to all downstream images
            TERMINAL="${{ steps.changes.outputs.terminal }}"
            BAKE_CONFIG="${{ steps.changes.outputs.bake-config }}"
            if [[ "$TERMINAL" == "true" || "$BAKE_CONFIG" == "true" ]]; then
              echo "terminal=true" >> $GITHUB_OUTPUT
              echo "webterm=true" >> $GITHUB_OUTPUT
              echo "vscode=true" >> $GITHUB_OUTPUT
              echo "marimo=true" >> $GITHUB_OUTPUT
            else
              echo "terminal=false" >> $GITHUB_OUTPUT
              echo "webterm=${{ steps.changes.outputs.webterm }}" >> $GITHUB_OUTPUT
              echo "vscode=${{ steps.changes.outputs.vscode }}" >> $GITHUB_OUTPUT
              echo "marimo=${{ steps.changes.outputs.marimo }}" >> $GITHUB_OUTPUT
            fi
          fi
      # Build the list of bake targets to build (newline-separated for bake-action)
      - name: Determine bake targets
        id: targets
        run: |
          TARGETS=""
          if [[ "${{ steps.filter.outputs.terminal }}" == "true" ]]; then
            TARGETS="terminal"
          fi
          if [[ "${{ steps.filter.outputs.webterm }}" == "true" ]]; then
            TARGETS="${TARGETS:+$TARGETS$'\n'}webterm"
          fi
          if [[ "${{ steps.filter.outputs.vscode }}" == "true" ]]; then
            TARGETS="${TARGETS:+$TARGETS$'\n'}vscode"
          fi
          if [[ "${{ steps.filter.outputs.marimo }}" == "true" ]]; then
            TARGETS="${TARGETS:+$TARGETS$'\n'}marimo"
          fi
          # Output as multiline string for bake-action
          echo "bake_targets<<EOF" >> $GITHUB_OUTPUT
          echo "$TARGETS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Bake targets to build:"
          echo "$TARGETS"

  # --- Job 0: Lint ---
  # Runs hadolint on all Dockerfiles to enforce best practices.
  # Must pass before any builds start.
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  # --- Job 1: Python Runtime (Matrix Build) ---
  # Builds the Python foundation images for all supported versions (3.10-3.14).
  # Each version is built in parallel via the matrix strategy.
  # Images are pushed to: images.canfar.net/cadc/python:<version>
  # On PRs: build-only (no push, no registry login).
  # Skipped if no python/** files changed (unless schedule/dispatch).
  python:
    name: Python ${{ matrix.version }}
    needs: [lint, detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # Only login to registry on push/schedule/dispatch (not PRs)
      - name: Login to CANFAR Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CANFAR_REGISTRY_USER }}
          password: ${{ secrets.CANFAR_REGISTRY_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./dockerfiles/python/${{ matrix.version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/cadc/python:${{ matrix.version }}
          # GitHub Actions cache for Docker layers (speeds up rebuilds)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: Interactive Stack (Bake Build) ---
# Builds only the changed targets using Docker Bake (terminal, webterm, vscode, marimo).
# Bake ensures the terminal image is built first and used as the base for
# downstream images, maintaining the dependency chain without pushing intermediates.
# Skipped if no interactive stack files changed.
  interactive-stack:
    name: Interactive Stack
    needs: [setup, lint, detect-changes]
    # Only run if at least one bake target needs building
    if: needs.detect-changes.outputs.bake_targets != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to CANFAR Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CANFAR_REGISTRY_USER }}
          password: ${{ secrets.CANFAR_REGISTRY_PASSWORD }}
      - name: Show targets to build
        run: 'echo "Building targets: ${{ needs.detect-changes.outputs.bake_targets }}"'
      # Bake builds only the targets that changed.
      # We override the tags with the dynamically generated release tag.
      - name: Build and Push (Bake)
        uses: docker/bake-action@v5
        env:
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
        with:
          targets: ${{ needs.detect-changes.outputs.bake_targets }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
