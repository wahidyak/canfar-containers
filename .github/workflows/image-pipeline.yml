name: CANFAR Container Image Pipeline

on:
  push:
    paths:
      - 'dockerfiles/**'
      - '.github/workflows/image-pipeline.yml'
      - 'docker-bake.hcl'
    branches: [main]
  pull_request:
    paths:
      - 'dockerfiles/**'
  workflow_dispatch:

env:
  REGISTRY: images.canfar.net
  RELEASE_TAG: "26.02"

jobs:
  # 0. LINT (Verify Dockerfile standards)
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  # 1. PYTHON RUNTIME (Matrix build for all supported versions)
  python:
    name: Python ${{ matrix.version }}
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to CANFAR Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CANFAR_REGISTRY_USER }}
          password: ${{ secrets.CANFAR_REGISTRY_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./dockerfiles/python/${{ matrix.version }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/cadc/python:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. INTERACTIVE STACK (Bake ensures layer integrity across Terminal and Webterm)
  interactive-stack:
    name: Interactive Stack
    needs: [lint, python]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to CANFAR Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CANFAR_REGISTRY_USER }}
          password: ${{ secrets.CANFAR_REGISTRY_PASSWORD }}
      - name: Build and Push (Bake)
        uses: docker/bake-action@v5
        with:
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
